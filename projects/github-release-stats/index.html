<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Julia Nechaevskaya">
    <meta name="description" content="Get release dates, authors, assets, and download counts for any GitHub project.">
    <meta http-equiv="cache-control" content="no-cache">
    <meta http-equiv="expires" content="0">
    <meta http-equiv="pragma" content="no-cache">
    <title>GitHub Release Stats</title>

    <link rel="stylesheet" href="third-party/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <link rel="help" href="mailto:www-validator@w3.org">
    <link rel="start" href="../../" title="Projects">
</head>

<body>
    <div class="container">
        <section class="tool-panel release-stats-panel">
            <div class="tool-header">
                <a class="back-button" href="../../index.html#various" aria-label="Back" title="Back"></a>
                <h3>GitHub Release Stats</h3>
            </div>

            <div id="search">
                <div class="search-form">
                    <div class="form-field">
                        <label for="username">GitHub username</label>
                        <input type="text" id="username" placeholder="e.g. jnechaevsky" required>
                    </div>

                    <div class="form-field">
                        <label for="repository">Repository name</label>
                        <input type="text" id="repository" placeholder="e.g. international-doom" required>
                    </div>

                    <button type="button" id="get-stats-button">Get release stats</button>
                </div>
            </div>

            <div id="description">
                <p>Release dates, authors, assets, and download counts for any GitHub project.</p>
            </div>

            <div id="title">
                <h1><span class="username"></span>/<span class="repository"></span></h1>
                <span class="description">release stats</span>
            </div>

            <div id="stats-result"></div>

            <nav id="pagination" aria-label="Release pages">
                <ul class="pager">
                    <li><a id="get-prev-results-button" href="#">Newer</a></li>
                    <li><a id="get-next-results-button" href="#">Older</a></li>
                </ul>
                <div id="per-page">
                    <label>Per page</label>
                    <select>
                        <option>5</option>
                        <option>10</option>
                        <option>15</option>
                        <option>20</option>
                        <option>25</option>
                        <option>30</option>
                        <option>50</option>
                        <option>100</option>
                        <option>500</option>
                    </select>
                </div>
            </nav>

            <div id="loader-gif" aria-live="polite">
                <img src="img/gif-load.gif" alt="">
            </div>
        </section>
    </div>

<script src="third-party/jquery/jquery-1.11.1.min.js" defer></script>
<script src="third-party/bootstrap/js/bootstrap.min.js" defer></script>
<script src="third-party/typahead/bootstrap3-typeahead.min.js" defer></script>
<script src="js/main.js" defer></script>
</body>
</html>
