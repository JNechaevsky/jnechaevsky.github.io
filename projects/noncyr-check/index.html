<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Проверка кириллического текста</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      width: 100%;
      background: #242430;
      border-radius: 16px;
      box-shadow: 0 0 20px #101019;
      padding: 24px;
    }
    textarea {
      width: calc(100% - 24px);
      height: 200px;
      background: #2e2f38;
      color: #d4d4d4;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      resize: vertical;
      outline: none;
    }
    .button-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
    }
    button {
      padding: 10px 20px;
      background: #165b99;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #2188e1;
    }
    .status {
      font-size: 15px;
      color: #90ee90;
    }
    .status.error {
      color: #ff6f6f;
    }
    .output {
      margin-top: 24px;
      white-space: pre-line;
      font-size: 16px;
      background: #2e2f38;
      padding: 12px;
      border-radius: 8px;
    }
    #fix-btn {
      margin-top: 24px;
    }
    #copy-btn {
      margin-top: 24px;
    }
    .line-ok {
      color: #d4d4d4;
    }
    .line-bad {
      color: #ff4f4f;
    }
    .bad-char {
      text-decoration: underline;
      color: #ff4f4f;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Проверка на некириллические символы</h2>
    <textarea id="text-input" placeholder="Вставьте текст для проверки..."></textarea>
    <div class="button-row">
      <button onclick="checkText()">Проверить</button>
      <span class="status" id="status-msg"></span>
    </div>
    <div id="output" class="output"></div>
    <button onclick="fixText()" id="fix-btn" style="display:none">Исправить</button>
    <button onclick="copyText()" id="copy-btn" style="display:none">Скопировать</button>
  </div>

  <script>
    const fixMap = {
      'A': 'А', 'B': 'В', 'E': 'Е', 'K': 'К', 'M': 'М', 'H': 'Н', 'O': 'О', 'P': 'Р', 'C': 'С', 'T': 'Т', 'Y': 'У', 'X': 'Х',
      'a': 'а', 'e': 'е', 'o': 'о', 'c': 'с', 'p': 'р', 'x': 'х'
    };

    function isCyrillicChar(char) {
      return /^[А-Яа-яЁё \-]$/.test(char);
    }

    function checkText() {
      const input = document.getElementById('text-input').value;
      const lines = input.split(/\r?\n/);
      const output = document.getElementById('output');
      const status = document.getElementById('status-msg');
      output.innerHTML = '';
      status.textContent = '';
      status.className = 'status';

      let globalHasErrors = false;

      lines.forEach((line) => {
        const div = document.createElement('div');
        let lineHTML = '';
        let lineHasErrors = false;

        for (const char of line) {
          if (isCyrillicChar(char) || char === '') {
            lineHTML += char;
          } else {
            lineHTML += `<span class="bad-char">${char}</span>`;
            lineHasErrors = true;
          }
        }

        if (lineHasErrors) globalHasErrors = true;
        div.innerHTML = lineHTML;
        div.className = lineHasErrors ? 'line-bad' : 'line-ok';
        output.appendChild(div);
      });

      const fixBtn = document.getElementById('fix-btn');
      const copyBtn = document.getElementById('copy-btn');
      fixBtn.style.display = globalHasErrors ? 'inline-block' : 'none';
      copyBtn.style.display = globalHasErrors ? 'none' : 'inline-block';

      if (!globalHasErrors) {
        status.textContent = 'Ошибок не найдено';
      } else {
        status.textContent = 'Обнаружены ошибки';
        status.classList.add('error');
      }
    }

    function fixText() {
      let input = document.getElementById('text-input').value;
      input = input.split('').map(char => fixMap[char] || char).join('');
      document.getElementById('text-input').value = input;
      document.getElementById('fix-btn').style.display = 'none';
      document.getElementById('copy-btn').style.display = 'inline-block';
      checkText();
    }

    function copyText() {
      const input = document.getElementById('text-input').value;
      navigator.clipboard.writeText(input).then(() => {
        const btn = document.getElementById('copy-btn');
        const prev = btn.textContent;
        btn.textContent = 'Скопировано!';
        setTimeout(() => btn.textContent = prev, 1200);
      });
    }
  </script>
</body>
</html>
