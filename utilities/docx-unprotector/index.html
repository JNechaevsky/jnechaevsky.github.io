<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Julia Nechaevskaya">
  <meta http-equiv="cache-control" content="no-cache">
  <meta http-equiv="expires" content="0">
  <meta http-equiv="pragma" content="no-cache">
  <title>DOCX Unprotector</title>

  <!-- Modern, minimal CSS -->
  <link rel="stylesheet" href="../../assets/css/styles.css">

  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="help" href="mailto:www-validator@w3.org">
  <link rel="start" href="../../" title="Projects">

  <!-- Inline CSS -->
  <style>
    .tool-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .drop-zone {
      background: #01101a;
      border: 2px dashed #165b99;
      border-radius: 8px;
      cursor: pointer;
      padding: 1.5rem;
      text-align: center;
      transition: background-color 0.2s, border-color 0.2s;
    }

    .drop-zone.dragover {
      background-color: rgba(255, 255, 255, 0.05);
      border-color: #4ea1ff;
    }

    .drop-zone p {
      color: var(--muted);
      margin: 0.35rem 0 0;
    }

    .file-input {
      display: none;
    }

    .pick-button {
      background: #165b99;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      display: inline-block;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
      margin-top: 0.75rem;
      padding: 12px 20px;
      text-align: center;
      transition: background 0.16s ease, color 0.16s ease;
    }

    .pick-button:hover {
      background: #4ea1ff;
      color: #fff;
    }

    .status {
      color: #90ee90;
      min-height: 1.5em;
    }

    .status.error {
      color: #ff6f6f;
    }

    @media (max-width: 560px) {
      .pick-button {
        width: 100%;
      }
    }
  </style>
  
</head>
<body>
  <div class="container">
    <section class="tool-panel">
      <h3 style="text-align:center">DOCX Unprotector</h3>

      <div class="drop-zone" id="drop-area" tabindex="0" role="button" aria-label="Choose DOCX file">
        <h4>Drop a DOCX file here</h4>
        <p>Removes document protection in this browser tab.</p>
        <label class="pick-button" for="fileInput">Choose file</label>
        <input class="file-input" type="file" id="fileInput" accept=".docx">
      </div>

      <div class="status" id="status-message" aria-live="polite"></div>
    </section>
  </div>

  <script src="jszip.min.js"></script>
  <script src="FileSaver.min.js"></script>
  <script>
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('fileInput');
    const statusMessage = document.getElementById('status-message');

    function setStatus(message, tone = '') {
      statusMessage.textContent = message;
      statusMessage.classList.toggle('error', tone === 'error');
    }

    function highlight(e) {
      e.preventDefault();
      dropArea.classList.add('dragover');
    }

    function unhighlight(e) {
      e.preventDefault();
      dropArea.classList.remove('dragover');
    }

    async function handleFile(file) {
      if (!file || !file.name.endsWith('.docx')) {
        setStatus('Only .docx files are supported.', 'error');
        return;
      }
      try {
        setStatus(`Processing ${file.name}...`);
        const arrayBuffer = await file.arrayBuffer();
        const zip = await JSZip.loadAsync(arrayBuffer);
        const settingsPath = 'word/settings.xml';
        if (!zip.files[settingsPath]) {
          setStatus('The document does not contain settings.xml.', 'error');
          return;
        }
        const settingsText = await zip.files[settingsPath].async('string');
        const cleaned = settingsText.replace(/<w:documentProtection[^>]*\/>/, '');
        zip.file(settingsPath, cleaned);
        const blob = await zip.generateAsync({ type: 'blob' });
        saveAs(blob, 'unprotected_' + file.name);
        setStatus(`Done! ${file.name} is ready to download.`);
      } catch (err) {
        setStatus('File processing error.', 'error');
        console.error(err);
      }
    }

    dropArea.addEventListener('dragover', highlight);
    dropArea.addEventListener('dragleave', unhighlight);
    dropArea.addEventListener('drop', (e) => {
      e.preventDefault();
      unhighlight(e);
      const file = e.dataTransfer.files[0];
      handleFile(file);
    });

    dropArea.addEventListener('click', (e) => {
      if (e.target instanceof Element && e.target.closest('.pick-button')) {
        return;
      }

      fileInput.click();
    });

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      handleFile(file);
    });

    dropArea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        fileInput.click();
      }
    });
  </script>
</body>
</html>
