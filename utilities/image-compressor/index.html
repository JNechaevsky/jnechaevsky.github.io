<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Julia Nechaevskaya">
  <meta http-equiv="cache-control" content="no-cache">
  <meta http-equiv="expires" content="0">
  <meta http-equiv="pragma" content="no-cache">
  <title>Image Compressor – PNG/JPG/PDF Compression Tool</title>

  <meta name="description" content="Free online image compressor for PNG and JPG files. Supports PDF conversion to images. Batch compression with quality control.">

  <!-- Modern, minimal CSS -->
  <link rel="stylesheet" href="../../assets/css/styles.css">

  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="help" href="mailto:www-validator@w3.org">
  <link rel="start" href="../../" title="Utilities">

  <style>
    .tool-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .drop-zone {
      background: #01101a;
      border: 2px dashed #165b99;
      border-radius: 8px;
      cursor: pointer;
      padding: 1.5rem;
      text-align: center;
      transition: background-color 0.2s, border-color 0.2s;
    }

    .drop-zone.dragover {
      background-color: rgba(255, 255, 255, 0.05);
      border-color: #4ea1ff;
    }

    .drop-zone p {
      color: var(--muted);
      margin: 0.35rem 0 0;
    }

    .file-input {
      display: none;
    }

    .pick-button,
    .action-button,
    .download-button {
      background: #165b99;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      display: inline-block;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
      margin-top: 0.75rem;
      padding: 12px 20px;
      text-align: center;
      transition: background 0.16s ease, color 0.16s ease;
    }

    .pick-button:hover,
    .action-button:hover,
    .download-button:hover {
      background: #4ea1ff;
      color: #fff;
    }

    .action-button:disabled {
      background: #35628a;
      color: #9bbcd6;
      cursor: not-allowed;
    }

    .action-button[hidden] {
      display: none;
    }

    .button-row {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .button-row .action-button {
      margin-top: 0;
    }

    .jpeg-options {
      align-items: center;
      color: var(--text);
      display: flex;
      gap: 0.5rem;
      min-height: 44px;
    }

    .quality-select {
      background: #01101a;
      border: 1px solid #165b99;
      border-radius: 8px;
      color: var(--text);
      font-size: 16px;
      height: 44px;
      padding: 10px 12px;
    }

    .quality-select:disabled {
      color: var(--muted);
      opacity: 0.65;
    }

    #zip-button {
      margin-left: auto;
    }

    .status {
      color: #90ee90;
      min-height: 1.5em;
    }

    .status.warning {
      color: #e6d37a;
    }

    .status.error {
      color: #ff6f6f;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .result-row {
      align-items: center;
      background: #01101a;
      border: 1px solid #165b99;
      border-radius: 8px;
      display: grid;
      gap: 0.75rem;
      grid-template-columns: minmax(0, 1fr) auto;
      padding: 0.8rem;
    }

    .result-name {
      display: block;
      overflow-wrap: anywhere;
    }

    .result-meta {
      color: var(--muted);
      font-size: 0.95em;
      margin: 0.2rem 0 0;
    }

    .download-button {
      margin-top: 0;
      min-width: 120px;
    }

    .skipped-label {
      color: #e6d37a;
      font-weight: 600;
      text-align: center;
    }

    .loaded-label {
      color: var(--text);
      font-weight: 600;
      text-align: center;
    }

    .processing-label {
      color: var(--muted);
      font-weight: 600;
      text-align: center;
    }

    .error-label {
      color: #ff6f6f;
      font-weight: 600;
      text-align: center;
    }

    @media (max-width: 560px) {
      .result-row {
        grid-template-columns: 1fr;
      }

      .download-button {
        width: 100%;
      }

      #zip-button {
        margin-left: 0;
        width: 100%;
      }

      .jpeg-options {
        justify-content: flex-start;
        width: 100%;
      }

      .quality-select {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <section class="tool-panel">
      <div class="tool-header">
        <a class="back-button" href="../../utilities.html#utilities" aria-label="Back" title="Back" onclick="if (history.length > 1) { history.back(); } else { location.href = this.href; } return false;"></a>
        <h3>Image and PDF Compressor</h3>
      </div>

      <div class="drop-zone" id="drop-zone" tabindex="0" role="button" aria-label="Choose PNG, JPG, or PDF files">
        <h4>Drop PNG, JPG, or PDF here</h4>
        <p>Files stay in this browser tab.</p>
        <label class="pick-button" for="file-input">Choose files</label>
        <input class="file-input" id="file-input" type="file" accept="image/png,image/jpeg,application/pdf,.png,.jpg,.jpeg,.pdf" multiple>
      </div>

      <div class="button-row">
        <button class="action-button" id="compress-button" type="button" disabled>Compress selected</button>
        <button class="action-button" id="clear-button" type="button" disabled>Clear</button>
        <label class="jpeg-options" for="jpeg-quality-select">
          JPEG quality
          <select class="quality-select" id="jpeg-quality-select" disabled>
            <option value="0.1">10%</option>
            <option value="0.2">20%</option>
            <option value="0.3">30%</option>
            <option value="0.4">40%</option>
            <option value="0.5">50%</option>
            <option value="0.6">60%</option>
            <option value="0.7">70%</option>
            <option value="0.8">80%</option>
            <option value="0.9" selected>90%</option>
          </select>
        </label>
        <button class="action-button" id="zip-button" type="button" disabled hidden>Download ZIP</button>
      </div>

      <div class="status" id="status-message" aria-live="polite"></div>
      <div class="results" id="results"></div>
    </section>
  </div>

  <script src="pdf.min.js"></script>
  <script src="jspdf.umd.min.js"></script>
  <script>
    // Use noWorker mode to avoid CORS issues with file:// protocol
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.noWorker = true;
      pdfjsLib.GlobalWorkerOptions.workerSrc = '';
    }
  </script>
  <script src="pako.min.js"></script>
  <script src="UPNG.js"></script>
  <script src="jszip.min.js"></script>
  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const compressButton = document.getElementById('compress-button');
    const zipButton = document.getElementById('zip-button');
    const clearButton = document.getElementById('clear-button');
    const jpegQualitySelect = document.getElementById('jpeg-quality-select');
    const statusMessage = document.getElementById('status-message');
    const results = document.getElementById('results');

    let selectedFiles = [];
    const objectUrls = [];
    const compressedResults = [];
    let loadedRows = [];
    let viewToken = 0;
    const ZIP_DOWNLOAD_MIN_RESULTS = 1;
    const pdfjsLib = window.pdfjsLib || null;

    function formatBytes(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / 1024 / 1024).toFixed(2)} MB`;
    }

    function setStatus(message, tone = '') {
      statusMessage.textContent = message;
      statusMessage.classList.toggle('warning', tone === 'warning');
      statusMessage.classList.toggle('error', tone === 'error');
    }

    function updateZipButton() {
      const canDownloadZip = compressedResults.length >= ZIP_DOWNLOAD_MIN_RESULTS;
      zipButton.hidden = !canDownloadZip;
      zipButton.disabled = !canDownloadZip;
    }

    function getSourceType(file) {
      if (file.type === 'image/jpeg' || /\.(jpe?g)$/i.test(file.name)) return 'image/jpeg';
      if (file.type === 'image/png' || /\.png$/i.test(file.name)) return 'image/png';
      if (file.type === 'application/pdf' || /\.pdf$/i.test(file.name)) return 'application/pdf';
      return '';
    }

    function isSupported(file) {
      const type = getSourceType(file);
      return type === 'image/jpeg' || type === 'image/png' || type === 'application/pdf';
    }

    function hasCompressibleFiles() {
      return selectedFiles.some((file) => {
        const type = getSourceType(file);
        return type === 'image/jpeg' || type === 'application/pdf';
      });
    }

    function getOutputType(file) {
      return getSourceType(file);
    }

    function getExtension(type) {
      if (type === 'image/jpeg') return 'jpg';
      if (type === 'image/png') return 'png';
      if (type === 'application/pdf') return 'pdf';
      return 'img';
    }

    function getOutputName(file, type) {
      const baseName = file.name.replace(/\.[^.]+$/, '');
      return `${baseName}-compressed.${getExtension(type)}`;
    }

    function getJpegQuality() {
      const quality = Number(jpegQualitySelect.value);
      return Number.isFinite(quality) ? quality : 0.9;
    }

    function canvasToBlob(canvas, type, quality) {
      return new Promise((resolve) => {
        if (type === 'image/png') {
          canvas.toBlob(resolve, type);
        } else {
          canvas.toBlob(resolve, type, quality);
        }
      });
    }

    function encodePng(canvas, ctx) {
      if (!window.UPNG || !window.pako) {
        throw new Error('PNG encoder is not available');
      }

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const encoded = UPNG.encode([imageData.data.buffer], canvas.width, canvas.height, 256);
      return new Blob([encoded], { type: 'image/png' });
    }

    async function loadImage(file) {
      if ('createImageBitmap' in window) {
        const bitmap = await createImageBitmap(file);
        return {
          width: bitmap.width,
          height: bitmap.height,
          draw(ctx, width, height) {
            ctx.drawImage(bitmap, 0, 0, width, height);
          },
          close() {
            if (bitmap.close) bitmap.close();
          }
        };
      }

      return new Promise((resolve, reject) => {
        const image = new Image();
        const url = URL.createObjectURL(file);

        image.onload = () => {
          URL.revokeObjectURL(url);
          resolve({
            width: image.naturalWidth,
            height: image.naturalHeight,
            draw(ctx, width, height) {
              ctx.drawImage(image, 0, 0, width, height);
            },
            close() {}
          });
        };

        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error('Image load failed'));
        };

        image.src = url;
      });
    }

    async function compressFile(file) {
      const sourceType = getSourceType(file);
      const outputType = getOutputType(file);
      const quality = outputType === 'image/jpeg' ? getJpegQuality() : undefined;

      if (sourceType === 'application/pdf') {
        if (!pdfjsLib) {
          throw new Error('PDF.js is not loaded');
        }
        if (!window.jspdf) {
          throw new Error('jsPDF is not loaded. Please check your internet connection or include jspdf.umd.min.js');
        }

        const buffer = await file.arrayBuffer();
        const loadingTask = pdfjsLib.getDocument({
          data: buffer,
          useWorkerFetch: false,
          useRangeRequests: false
        });
        const pdf = await loadingTask.promise;
        const numPages = pdf.numPages;

        const { jsPDF } = window.jspdf;
        const newPdf = new jsPDF();
        const quality = getJpegQuality();

        for (let i = 1; i <= numPages; i++) {
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: 1.5 }); // Баланс между качеством и размером

          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d', { alpha: false });
          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);

          await page.render({ canvasContext: ctx, viewport }).promise;

          // Сжимаем страницу в JPEG с выбранным качеством
          const imgData = canvas.toDataURL('image/jpeg', quality);
          
          const pageWidth = newPdf.internal.pageSize.getWidth();
          const pageHeight = newPdf.internal.pageSize.getHeight();
          
          // Масштабируем изображение под страницу PDF, сохраняя пропорции
          const imgProps = newPdf.getImageProperties(imgData);
          const pdfWidth = pageWidth;
          const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;

          if (i > 1) {
            newPdf.addPage();
          }
          newPdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
          
          // Очищаем canvas для экономии памяти
          canvas.width = 0;
          canvas.height = 0;
        }

        pdf.destroy();

        const pdfBlob = newPdf.output('blob');

        return {
          blob: pdfBlob,
          outputType: 'application/pdf',
          outputName: getOutputName(file, 'application/pdf'),
          qualityPercent: Math.round(quality * 100),
          width: 0,
          height: 0,
          isLarger: pdfBlob.size >= file.size
        };
      }

      const image = await loadImage(file);
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d', { alpha: outputType !== 'image/jpeg' });

      if (!ctx) {
        image.close();
        throw new Error('Canvas is not available');
      }

      canvas.width = image.width;
      canvas.height = image.height;

      image.draw(ctx, canvas.width, canvas.height);
      image.close();

      const blob = outputType === 'image/png'
        ? encodePng(canvas, ctx)
        : await canvasToBlob(canvas, outputType, quality);
      const width = canvas.width;
      const height = canvas.height;
      canvas.width = 0;
      canvas.height = 0;

      if (!blob) {
        throw new Error('Browser could not encode this format');
      }

      if (blob.type && blob.type !== outputType) {
        throw new Error(`${getExtension(outputType).toUpperCase()} encoding is not supported by this browser`);
      }

      return {
        blob,
        outputType,
        outputName: getOutputName(file, outputType),
        qualityPercent: outputType === 'image/jpeg' ? Math.round(quality * 100) : null,
        width,
        height
      };
    }

    function renderSelection() {
      compressButton.disabled = selectedFiles.length === 0;
      clearButton.disabled = selectedFiles.length === 0 && results.children.length === 0;
      jpegQualitySelect.disabled = !hasCompressibleFiles();

      if (selectedFiles.length === 0) {
        setStatus('');
        return;
      }

      const word = selectedFiles.length === 1 ? 'file' : 'files';
      const pdfCount = selectedFiles.filter((file) => getSourceType(file) === 'application/pdf').length;
      const statusText = `${selectedFiles.length} ${word} selected${pdfCount > 0 ? ` (${pdfCount} PDF)` : ''}.`;
      setStatus(statusText);
    }

    async function renderLoadedFiles(token) {
      results.innerHTML = '';

      loadedRows = selectedFiles.map((file) => {
        const row = document.createElement('article');
        const info = document.createElement('div');
        const name = document.createElement('strong');
        const meta = document.createElement('p');
        const loadedLabel = document.createElement('span');

        row.className = 'result-row';
        name.className = 'result-name';
        name.textContent = file.name;
        meta.className = 'result-meta';
        meta.textContent = `${formatBytes(file.size)}. Reading file...`;
        loadedLabel.className = 'loaded-label';
        loadedLabel.textContent = 'Loaded';

        info.append(name, meta);
        row.append(info, loadedLabel);
        results.append(row);

        return { file, meta, row, action: loadedLabel };
      });

      for (const row of loadedRows) {
        if (token !== viewToken) return;

        try {
          const type = getSourceType(row.file);
          if (type === 'application/pdf') {
            if (!pdfjsLib) {
              if (token === viewToken) {
                row.meta.textContent = `${formatBytes(row.file.size)}. PDF.js not loaded.`;
              }
              continue;
            }

            const buffer = await row.file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: buffer, useWorkerFetch: false, useRangeRequests: false }).promise;
            const numPages = pdf.numPages;
            pdf.destroy();

            if (token === viewToken) {
              row.meta.textContent = `${formatBytes(row.file.size)}. ${numPages} page(s) (PDF)`;
            }
          } else {
            const image = await loadImage(row.file);
            const dimensions = `${image.width} x ${image.height}px`;
            image.close();

            if (token === viewToken) {
              row.meta.textContent = `${formatBytes(row.file.size)}. ${dimensions}.`;
            }
          }
        } catch (error) {
          if (token === viewToken) {
            row.meta.textContent = `${formatBytes(row.file.size)}. Could not read file.`;
          }
        }
      }
    }

    function addFiles(files) {
      const nextFiles = Array.from(files).filter(isSupported);
      const skipped = files.length - nextFiles.length;

      selectedFiles = nextFiles;
      results.innerHTML = '';
      loadedRows = [];
      compressedResults.length = 0;
      updateZipButton();
      objectUrls.splice(0).forEach((url) => URL.revokeObjectURL(url));
      const token = ++viewToken;
      renderSelection();
      renderLoadedFiles(token);

      if (skipped > 0) {
        setStatus(`${nextFiles.length} supported file(s) selected. ${skipped} skipped.`, 'error');
      }
    }

    function setRowAction(row, action) {
      row.action.replaceWith(action);
      row.action = action;
    }

    function renderProcessing(row) {
      const processingLabel = document.createElement('span');
      processingLabel.className = 'processing-label';
      processingLabel.textContent = 'Processing...';
      setRowAction(row, processingLabel);
    }

    function renderResult(file, compressed, row) {
      if (compressed.isLarger) {
        row.meta.innerHTML = `Original: ${formatBytes(file.size)}, Output: ${formatBytes(compressed.blob.size)}. <br>Compression would increase file size, try to reduce JPEG quality.`;
        const skippedLabel = document.createElement('span');
        skippedLabel.className = 'skipped-label';
        skippedLabel.textContent = 'Skipped';
        setRowAction(row, skippedLabel);
        return false;
      }

      const savedBytes = file.size - compressed.blob.size;
      const savedPercent = file.size > 0 ? (savedBytes / file.size) * 100 : 0;
      const isSmaller = savedBytes > 0;
      const sizeText = isSmaller
        ? `${formatBytes(file.size)} -> ${formatBytes(compressed.blob.size)}, saved ${savedPercent.toFixed(1)}%`
        : `No smaller result. Original: ${formatBytes(file.size)}, browser output: ${formatBytes(compressed.blob.size)}`;

      const qualityText = compressed.qualityPercent === null
        ? ''
        : ` JPEG quality: ${compressed.qualityPercent}%.`;

      const isPdf = getSourceType(file) === 'application/pdf';
      const dimensionText = isPdf ? '' : ` ${compressed.width} x ${compressed.height}px.`;
      row.meta.textContent = `${sizeText}.${dimensionText}${qualityText}`;

      if (!isSmaller) {
        const skippedLabel = document.createElement('span');
        skippedLabel.className = 'skipped-label';
        skippedLabel.textContent = 'Skipped';
        setRowAction(row, skippedLabel);
        return false;
      }

      const url = URL.createObjectURL(compressed.blob);
      objectUrls.push(url);

      const link = document.createElement('a');
      link.className = 'download-button';
      link.href = url;
      link.download = compressed.outputName;
      link.textContent = 'Download';

      setRowAction(row, link);
      return true;
    }

    function triggerDownload(blob, fileName) {
      const link = document.createElement('a');
      const objectUrl = URL.createObjectURL(blob);
      link.href = objectUrl;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(objectUrl);
    }

    async function downloadZip() {
      if (compressedResults.length < ZIP_DOWNLOAD_MIN_RESULTS) return;

      if (!window.JSZip) {
        setStatus('ZIP engine is not available. Check local jszip.min.js.', 'error');
        return;
      }

      zipButton.disabled = true;
      const resultWord = compressedResults.length === 1 ? 'file' : 'files';
      setStatus(`Building ZIP with ${compressedResults.length} ${resultWord}...`);

      try {
        const zip = new JSZip();

        for (const result of compressedResults) {
          zip.file(result.outputName, result.blob);
        }

        const zipBlob = await zip.generateAsync({ type: 'blob' });
        triggerDownload(zipBlob, 'compressed-images.zip');
        setStatus(`ZIP archive with ${compressedResults.length} ${resultWord} is ready.`);
      } catch (error) {
        console.error(error);
        setStatus('Could not build ZIP archive.', 'error');
      } finally {
        updateZipButton();
      }
    }

    function renderError(file, error, row) {
      row.meta.textContent = error.message;
      const errorLabel = document.createElement('span');
      errorLabel.className = 'error-label';
      errorLabel.textContent = 'Error';
      setRowAction(row, errorLabel);
    }

    async function compressSelected() {
      if (selectedFiles.length === 0) return;

      viewToken++;
      compressButton.disabled = true;
      compressedResults.length = 0;
      updateZipButton();
      objectUrls.splice(0).forEach((url) => URL.revokeObjectURL(url));
      let failures = 0;
      let skipped = 0;

      for (let index = 0; index < selectedFiles.length; index++) {
        const file = selectedFiles[index];
        const row = loadedRows[index];
        setStatus(`Compressing ${index + 1} of ${selectedFiles.length}: ${file.name}`);

        renderProcessing(row);

        try {
          const compressed = await compressFile(file);
          if (!renderResult(file, compressed, row)) {
            skipped++;
          } else {
            compressedResults.push({
              blob: compressed.blob,
              outputName: compressed.outputName
            });
          }
        } catch (error) {
          console.error(error);
          failures++;
          renderError(file, error, row);
        }
      }

      const word = selectedFiles.length === 1 ? 'file' : 'files';
      const pdfCount = selectedFiles.filter((file) => getSourceType(file) === 'application/pdf').length;
      const skippedText = skipped > 0 ? `, ${skipped} already compact` : '';
      const failureText = failures > 0 ? `, ${failures} failed` : '';
      setStatus(
        `Finished ${selectedFiles.length} ${word}${skippedText}${failureText}${pdfCount > 0 ? ` (${pdfCount} PDF converted)` : ''}.`,
        failures > 0 ? 'error' : (skipped > 0 ? 'warning' : '')
      );
      compressButton.disabled = selectedFiles.length === 0;
      updateZipButton();
      clearButton.disabled = false;
    }

    function clearAll() {
      viewToken++;
      selectedFiles = [];
      fileInput.value = '';
      results.innerHTML = '';
      loadedRows = [];
      compressedResults.length = 0;
      updateZipButton();
      objectUrls.splice(0).forEach((url) => URL.revokeObjectURL(url));
      renderSelection();
    }

    ['dragenter', 'dragover'].forEach((eventName) => {
      dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropZone.classList.add('dragover');
      });
    });

    ['dragleave', 'drop'].forEach((eventName) => {
      dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropZone.classList.remove('dragover');
      });
    });

    dropZone.addEventListener('drop', (event) => addFiles(event.dataTransfer.files));
    dropZone.addEventListener('click', (event) => {
      if (event.target instanceof Element && event.target.closest('.pick-button')) return;
      fileInput.click();
    });
    dropZone.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        fileInput.click();
      }
    });

    fileInput.addEventListener('change', () => addFiles(fileInput.files));
    compressButton.addEventListener('click', compressSelected);
    zipButton.addEventListener('click', downloadZip);
    clearButton.addEventListener('click', clearAll);
  </script>
</body>
</html>
