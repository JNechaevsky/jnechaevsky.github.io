<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Julia Nechaevskaya">
  <meta http-equiv="cache-control" content="no-cache">
  <meta http-equiv="expires" content="0">
  <meta http-equiv="pragma" content="no-cache">
  <title>PDF Splitter & Merger</title>

  <link rel="stylesheet" href="../../assets/css/styles.css">

  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="help" href="mailto:www-validator@w3.org">
  <link rel="start" href="../../" title="Projects">

  <style>
    .tool-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .drop-zone {
      background: #01101a;
      border: 2px dashed #165b99;
      border-radius: 8px;
      cursor: pointer;
      padding: 1.5rem;
      text-align: center;
      transition: background-color 0.2s, border-color 0.2s;
    }

    .drop-zone.dragover {
      background-color: rgba(255, 255, 255, 0.05);
      border-color: #4ea1ff;
    }

    .drop-zone p {
      color: var(--muted);
      margin: 0.35rem 0 0;
    }

    .file-input {
      display: none;
    }

    .pick-button,
    .action-button {
      background: #165b99;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      display: inline-block;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
      margin-top: 0.75rem;
      padding: 12px 20px;
      text-align: center;
      transition: background 0.16s ease, color 0.16s ease;
    }

    .pick-button:hover,
    .action-button:hover {
      background: #4ea1ff;
      color: #fff;
    }

    .action-button:disabled {
      background: #35628a;
      color: #9bbcd6;
      cursor: not-allowed;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .status {
      color: #90ee90;
      min-height: 1.5em;
    }

    .status.warning {
      color: #e6d37a;
    }

    .status.error {
      color: #ff6f6f;
    }

    .file-summary {
      background: #01101a;
      border: 1px solid #165b99;
      border-radius: 8px;
      color: var(--text);
      display: none;
      line-height: 1.45;
      padding: 0.8rem;
    }

    .file-summary strong {
      overflow-wrap: anywhere;
    }
  </style>
</head>

<body>
  <div class="container">
    <section class="tool-panel">
      <h3 style="text-align:center">PDF Splitter & Merger</h3>

      <div class="drop-zone" id="drop-zone" tabindex="0" role="button" aria-label="Choose PDF or image files">
        <h4>Drop PDF or PNG/JPG files</h4>
        <p>One PDF -> ZIP with JPG pages. Multiple PDFs or images -> one merged PDF.</p>
        <label class="pick-button" for="file-input">Choose files</label>
        <input class="file-input" id="file-input" type="file" accept="application/pdf,image/png,image/jpeg,.pdf,.png,.jpg,.jpeg" multiple>
      </div>

      <div class="button-row">
        <button class="action-button" id="split-button" type="button" disabled>Split</button>
        <button class="action-button" id="merge-button" type="button" disabled>Merge</button>
        <button class="action-button" id="clear-button" type="button" disabled>Clear</button>
      </div>

      <div class="file-summary" id="file-summary" aria-live="polite"></div>
      <div class="status" id="status-message" aria-live="polite"></div>
    </section>
  </div>

  <script src="./pdf.min.js"></script>
  <script src="./pdf-lib.min.js"></script>
  <script src="./jszip.min.js"></script>
  <script src="./jspdf.umd.min.js"></script>
  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const splitButton = document.getElementById('split-button');
    const mergeButton = document.getElementById('merge-button');
    const clearButton = document.getElementById('clear-button');
    const statusMessage = document.getElementById('status-message');
    const fileSummary = document.getElementById('file-summary');
    const pdfjsLib = window.pdfjsLib || null;
    const pdfLib = window.PDFLib || null;

    if (pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = './pdf.worker.min.js';
    }

    const MODE_NONE = 'none';
    const MODE_SPLIT = 'split';
    const MODE_MERGE_IMAGES = 'merge-images';
    const MODE_MERGE_PDFS = 'merge-pdfs';

    let selectedFiles = [];
    let currentMode = MODE_NONE;

    function formatBytes(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / 1024 / 1024).toFixed(2)} MB`;
    }

    function setStatus(message, tone = '') {
      statusMessage.textContent = message;
      statusMessage.classList.toggle('warning', tone === 'warning');
      statusMessage.classList.toggle('error', tone === 'error');
    }

    if (!pdfjsLib) {
      setStatus('PDF engine did not load. Check local pdf.min.js.', 'error');
    }

    function isPdf(file) {
      return file.type === 'application/pdf' || /\.pdf$/i.test(file.name);
    }

    function isImage(file) {
      return file.type === 'image/jpeg'
        || file.type === 'image/png'
        || /\.(jpe?g|png)$/i.test(file.name);
    }

    function bytesSum(files) {
      return files.reduce((sum, file) => sum + file.size, 0);
    }

    function getMode(files) {
      if (!files.length) return MODE_NONE;

      const pdfFiles = files.filter(isPdf);
      const imageFiles = files.filter(isImage);

      if (pdfFiles.length === 1 && files.length === 1) return MODE_SPLIT;
      if (pdfFiles.length > 1 && pdfFiles.length === files.length) return MODE_MERGE_PDFS;
      if (imageFiles.length === files.length) return MODE_MERGE_IMAGES;
      return MODE_NONE;
    }

    function updateButtons() {
      const canMerge = currentMode === MODE_MERGE_IMAGES
        || (currentMode === MODE_MERGE_PDFS && pdfLib);

      splitButton.disabled = currentMode !== MODE_SPLIT;
      mergeButton.disabled = !canMerge;
      clearButton.disabled = selectedFiles.length === 0;
    }

    function buildSummary(files, mode) {
      if (!files.length) return '';

      if (mode === MODE_SPLIT) {
        const file = files[0];
        return `<strong>${file.name}</strong><br>Size: ${formatBytes(file.size)}<br>Mode: Split PDF into JPG ZIP`;
      }

      if (mode === MODE_MERGE_IMAGES) {
        const firstNames = files.slice(0, 3).map((file) => file.name).join(', ');
        const extra = files.length > 3 ? `, +${files.length - 3} more` : '';
        return `<strong>${files.length} image file(s)</strong><br>Size: ${formatBytes(bytesSum(files))}<br>First: ${firstNames}${extra}<br>Mode: Merge images into PDF`;
      }

      if (mode === MODE_MERGE_PDFS) {
        const firstNames = files.slice(0, 3).map((file) => file.name).join(', ');
        const extra = files.length > 3 ? `, +${files.length - 3} more` : '';
        return `<strong>${files.length} PDF file(s)</strong><br>Size: ${formatBytes(bytesSum(files))}<br>First: ${firstNames}${extra}<br>Mode: Merge PDFs into one PDF`;
      }

      return `<strong>${files.length} file(s)</strong><br>Unsupported combination. Use one PDF, only PDFs, or only PNG/JPG files.`;
    }

    function normalizeFileSet(fileList) {
      selectedFiles = Array.from(fileList || []);
      currentMode = getMode(selectedFiles);

      if (!selectedFiles.length) {
        fileSummary.style.display = 'none';
        fileSummary.innerHTML = '';
        setStatus('');
        updateButtons();
        return;
      }

      fileSummary.innerHTML = buildSummary(selectedFiles, currentMode);
      fileSummary.style.display = 'block';

      if (currentMode === MODE_SPLIT) {
        setStatus('PDF is ready to split.');
      } else if (currentMode === MODE_MERGE_IMAGES) {
        setStatus('Images are ready to merge into PDF.');
      } else if (currentMode === MODE_MERGE_PDFS) {
        if (pdfLib) {
          setStatus('PDFs are ready to merge into one PDF.');
        } else {
          setStatus('PDF merge engine did not load. Check local pdf-lib.min.js.', 'error');
        }
      } else {
        setStatus('Unsupported selection. Drop one PDF, only PDFs, or only PNG/JPG files.', 'warning');
      }

      updateButtons();
    }

    function resetState() {
      selectedFiles = [];
      currentMode = MODE_NONE;
      fileInput.value = '';
      fileSummary.style.display = 'none';
      fileSummary.innerHTML = '';
      setStatus('');
      updateButtons();
    }

    async function renderPageToJpeg(pdfPage, pageNumber) {
      const viewport = pdfPage.getViewport({ scale: 2.1 }); /* Aprox. ~1024 width */
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d', { alpha: false });

      canvas.width = Math.floor(viewport.width);
      canvas.height = Math.floor(viewport.height);

      await pdfPage.render({ canvasContext: context, viewport }).promise;

      const blob = await new Promise((resolve, reject) => {
        canvas.toBlob((result) => {
          if (!result) {
            reject(new Error('Failed to export JPG blob.'));
            return;
          }
          resolve(result);
        }, 'image/jpeg', 0.92);
      });

      const filename = `page-${String(pageNumber).padStart(3, '0')}.jpg`;
      return { filename, blob };
    }

    async function splitPdfToZip(pdfFile) {
      if (!pdfjsLib) {
        throw new Error('PDF.js is not loaded.');
      }

      const zip = new JSZip();
      const fileBuffer = await pdfFile.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: fileBuffer }).promise;

      for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
        setStatus(`Processing page ${pageNumber} of ${pdf.numPages}...`);
        const page = await pdf.getPage(pageNumber);
        const { filename, blob } = await renderPageToJpeg(page, pageNumber);
        zip.file(filename, blob);
      }

      setStatus('Building ZIP archive...');
      return zip.generateAsync({ type: 'blob' });
    }

    async function loadImageElement(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();

        img.onload = () => {
          URL.revokeObjectURL(url);
          resolve(img);
        };

        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error(`Unable to read image: ${file.name}`));
        };

        img.src = url;
      });
    }

    function drawImageOnCanvas(image) {
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d', { alpha: false });
      canvas.width = image.naturalWidth;
      canvas.height = image.naturalHeight;
      context.fillStyle = '#ffffff';
      context.fillRect(0, 0, canvas.width, canvas.height);
      context.drawImage(image, 0, 0);
      return canvas;
    }

    function canvasToJpegDataUrl(canvas) {
      return canvas.toDataURL('image/jpeg', 0.92);
    }

    async function mergeImagesToPdf(files) {
      const { jsPDF } = window.jspdf;
      let pdf = null;

      for (let index = 0; index < files.length; index += 1) {
        const file = files[index];
        setStatus(`Merging image ${index + 1} of ${files.length}...`);

        const image = await loadImageElement(file);
        const canvas = drawImageOnCanvas(image);
        const dataUrl = canvasToJpegDataUrl(canvas);

        const widthPt = Math.max(1, image.naturalWidth * 0.75);
        const heightPt = Math.max(1, image.naturalHeight * 0.75);
        const orientation = widthPt >= heightPt ? 'landscape' : 'portrait';

        if (!pdf) {
          pdf = new jsPDF({
            orientation,
            unit: 'pt',
            format: [widthPt, heightPt],
            compress: true
          });
        } else {
          pdf.addPage([widthPt, heightPt], orientation);
        }

        pdf.addImage(dataUrl, 'JPEG', 0, 0, widthPt, heightPt, undefined, 'FAST');
      }

      if (!pdf) {
        throw new Error('No images to merge.');
      }

      return pdf.output('blob');
    }

    async function mergePdfsToPdf(files) {
      if (!pdfLib) {
        throw new Error('PDFLib is not loaded.');
      }

      const mergedPdf = await pdfLib.PDFDocument.create();

      for (let index = 0; index < files.length; index += 1) {
        const file = files[index];
        setStatus(`Merging PDF ${index + 1} of ${files.length}...`);

        const fileBuffer = await file.arrayBuffer();
        const sourcePdf = await pdfLib.PDFDocument.load(fileBuffer, {
          ignoreEncryption: true
        });
        const pageIndices = sourcePdf.getPageIndices();
        const copiedPages = await mergedPdf.copyPages(sourcePdf, pageIndices);

        for (const page of copiedPages) {
          mergedPdf.addPage(page);
        }
      }

      const mergedBytes = await mergedPdf.save();
      return new Blob([mergedBytes], { type: 'application/pdf' });
    }

    function buildBaseName(name, fallback) {
      const withoutExtension = name.replace(/\.[^.]+$/u, '');
      return withoutExtension || fallback;
    }

    function normalizeDownloadName(baseName, extensionSuffix) {
      // [PN] Keep Cyrillic and other Unicode letters/digits in output filenames.
      const normalizedBaseName = baseName.normalize('NFKC');
      const safeName = normalizedBaseName
        .replace(/[\s]+/g, ' ')
        .replace(/[^\p{L}\p{N}._ -]/gu, '_')
        .replace(/^[ ._-]+|[ ._-]+$/g, '')
        || 'file';
      return `${safeName}${extensionSuffix}`;
    }

    function triggerDownload(blob, fileName) {
      const link = document.createElement('a');
      const objectUrl = URL.createObjectURL(blob);
      link.href = objectUrl;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(objectUrl);
    }

    dropZone.addEventListener('dragover', (event) => {
      event.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (event) => {
      event.preventDefault();
      dropZone.classList.remove('dragover');
      normalizeFileSet(event.dataTransfer.files);
    });

    dropZone.addEventListener('click', (event) => {
      if (event.target.closest('.pick-button') || event.target === fileInput) {
        return;
      }

      fileInput.click();
    });

    dropZone.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        fileInput.click();
      }
    });

    fileInput.addEventListener('change', () => {
      normalizeFileSet(fileInput.files);
    });

    splitButton.addEventListener('click', async () => {
      if (currentMode !== MODE_SPLIT) return;

      splitButton.disabled = true;
      mergeButton.disabled = true;
      clearButton.disabled = true;

      try {
        const pdfFile = selectedFiles[0];
        const zipBlob = await splitPdfToZip(pdfFile);
        const zipName = normalizeDownloadName(buildBaseName(pdfFile.name, 'split-pages'), '-jpg.zip');
        triggerDownload(zipBlob, zipName);
        setStatus('Done! Your ZIP with JPG pages is ready.');
      } catch (error) {
        // [PN] Runtime error details for debugging in developer console.
        console.error(error);
        setStatus('Could not split this PDF. Please try another file.', 'error');
      } finally {
        updateButtons();
      }
    });

    mergeButton.addEventListener('click', async () => {
      if (currentMode !== MODE_MERGE_IMAGES && currentMode !== MODE_MERGE_PDFS) return;

      splitButton.disabled = true;
      mergeButton.disabled = true;
      clearButton.disabled = true;

      try {
        const isPdfMerge = currentMode === MODE_MERGE_PDFS;
        const pdfBlob = isPdfMerge
          ? await mergePdfsToPdf(selectedFiles)
          : await mergeImagesToPdf(selectedFiles);
        const fallbackName = isPdfMerge ? 'merged-pdfs' : 'merged-images';
        const outputName = normalizeDownloadName(buildBaseName(selectedFiles[0]?.name || fallbackName, fallbackName), '.pdf');
        triggerDownload(pdfBlob, outputName);
        setStatus('Done! Your merged PDF is ready.');
      } catch (error) {
        // [PN] Runtime error details for debugging in developer console.
        console.error(error);
        setStatus('Could not merge these files. Please try another set.', 'error');
      } finally {
        updateButtons();
      }
    });

    clearButton.addEventListener('click', () => {
      resetState();
    });
  </script>
</body>
</html>
